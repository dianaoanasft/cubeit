name: Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    # Opting into Node 24 as recommended by the runner
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4  # Updated from v3

      - name: Set up Python
        uses: actions/setup-python@v5  # Updated from v4
        with:
          python-version: '3.12'
          cache: 'pip' # Speeds up subsequent runs

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest-playwright pytest-base-url playwright

      - name: Ensure browser is installed
        run: python -m playwright install chromium --with-deps

      - name: Run Server and Tests
        run: | 
          # Start server in background
          python -m http.server 8000 & 
          # Wait for server to be ready
          sleep 5 
          # Using 'python -m pytest' avoids the 127 "command not found" error
          python -m pytest -v